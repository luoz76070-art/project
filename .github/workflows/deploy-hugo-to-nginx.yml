# Copy this file to the monorepo root as:
#   .github/workflows/deploy-hugo-to-nginx.yml
# It assumes this project lives in the monorepo subdirectory:
#   hermes-deploy/

name: Deploy Hugo-to-Nginx

on:
  push:
    branches:
      - main
    paths:
      - "hermes-deploy/**"
      - ".github/workflows/deploy-hugo-to-nginx.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hermes-deploy
    env:
      HUGO_VERSION: "0.160.1"
      DEPLOY_HOST: ${{ vars.BLOG_DEPLOY_HOST }}
      DEPLOY_PATH: ${{ vars.BLOG_DEPLOY_PATH }}
      DEPLOY_USER: ${{ vars.BLOG_DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.BLOG_DEPLOY_PORT }}
      RELEASES_TO_KEEP: ${{ vars.BLOG_RELEASES_TO_KEEP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo extended
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb
          hugo version

      - name: Build site
        run: ./scripts/build.sh

      - name: Configure SSH
        env:
          BLOG_DEPLOY_SSH_KEY: ${{ secrets.BLOG_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${BLOG_DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy release
        run: |
          set -euo pipefail
          DEPLOY_USER="${DEPLOY_USER:-root}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          RELEASES_TO_KEEP="${RELEASES_TO_KEEP:-5}"
          ./scripts/deploy_to_aliyun.sh "${DEPLOY_HOST}" "${DEPLOY_PATH}" "${DEPLOY_USER}" --skip-build --keep "${RELEASES_TO_KEEP}" --port "${DEPLOY_PORT}"
